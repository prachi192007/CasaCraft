<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Interior Design Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,600,0,0" />

    <style>
        :root {
            --bg-overlay: rgba(0,0,0,.6);
            --card-bg: #fff;
            --sidebar-bg: #f4efe7;
            --text-color: #333;
            --input-border: #ddd;
            --accent: #355f4a;
        }

        body.dark-mode {
            --bg-overlay: rgba(0,0,0,.85);
            --card-bg: #1e1e1e;
            --sidebar-bg: #2a2a2a;
            --text-color: #f4f4f4;
            --input-border: #444;
        }

        * { box-sizing: border-box; font-family: 'Inter', sans-serif; transition: background 0.3s, color 0.3s; }
        
        body {
            margin: 0; height: 100vh;
            background: linear-gradient(var(--bg-overlay), var(--bg-overlay)),
                        url("https://images.unsplash.com/photo-1505691938895-1758d7feb511?auto=format&fit=crop&w=1600&q=80") center/cover no-repeat;
            display: flex; justify-content: center; align-items: center;
        }

        .card {
            width: 85%; max-width: 1100px; height: 80%;
            background: var(--card-bg); border-radius: 24px;
            display: flex; overflow: hidden; position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            color: var(--text-color);
        }

        .left {
            width: 40%; background: var(--sidebar-bg);
            padding: 32px; display: flex;
            flex-direction: column; gap: 12px;
            overflow-y: auto;
        }

        .right {
            flex: 1; padding: 32px;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            background: transparent;
            position: relative;
        }

        .comparison-slider {
            position: relative;
            width: 90%;
            height: 90%;
            max-height: 450px;
            border-radius: 18px;
            overflow: hidden;
            display: none; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .before-img {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            z-index: 1;
        }

        .result-img {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0; left: 0;
            object-fit: cover; 
            z-index: 2;
            display: none;
            clip-path: inset(0 0 0 100%);
        }

        .slider-handle {
            position: absolute;
            top: 0; bottom: 0; left: 100%;
            width: 4px;
            background: white;
            cursor: ew-resize;
            z-index: 10;
            display: none; 
        }

        .slider-handle::after {
            content: '↔';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 30px; height: 30px;
            background: var(--accent);
            color: white; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold;
        }

        #saveBtn {
            display: none; 
            position: absolute;
            bottom: 45px; 
            right: 45px;
            background: var(--accent);
            color: white;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: all 0.2s ease;
            z-index: 15;
        }

        #saveBtn:hover {
            background: #2a4b3a;
            transform: scale(1.1);
            box-shadow: 0 6px 15px rgba(0,0,0,0.3);
        }

        #saveBtn span { font-size: 26px; }

        /* HEADER ALIGNMENT */
        .header-row {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 5px;
        }
        .header-group { display: flex; align-items: center; gap: 12px; }
        .header-row h2 { margin: 0; font-size: 24px; }
        .logo { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; }

        .theme-switch {
            position: relative; display: inline-block; width: 44px; height: 22px;
        }
        .theme-switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #ccc; transition: .4s; border-radius: 34px;
        }
        .slider:before {
            position: absolute; content: "☀️"; height: 16px; width: 16px; left: 3px; bottom: 3px;
            background-color: white; transition: .4s; border-radius: 50%; font-size: 10px;
            display: flex; align-items: center; justify-content: center;
        }
        input:checked + .slider { background-color: var(--accent); }
        input:checked + .slider:before { transform: translateX(22px); content: "🌙"; }

        label { font-size: 12px; font-weight: 600; color: #777; margin-bottom: -5px; text-transform: uppercase; }
        
        input, select {
            width: 100%; padding: 12px;
            border-radius: 12px; border: 1px solid var(--input-border);
            font-size: 14px; margin-bottom: 5px;
            background: var(--card-bg); color: var(--text-color);
        }

        .color-options { display: flex; gap: 10px; margin-top: 5px; margin-bottom: 5px; }
        .color-circle {
            width: 28px; height: 28px; border-radius: 50%; cursor: pointer;
            border: 2px solid #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .color-circle.active { border: 2px solid var(--accent); transform: scale(1.1); }

        .gen-btn {
            background: var(--accent); color: #fff;
            border: none; padding: 16px; margin-top: 10px;
            border-radius: 16px; cursor: pointer;
            font-weight: 600; transition: 0.3s;
        }
        .gen-btn:hover { background: #2a4b3a; }

        .loader-box { display: none; text-align: center; margin-top: 10px; }
        .spinner {
            width: 24px; height: 24px; border: 3px solid #ddd;
            border-top: 3px solid var(--accent); border-radius: 50%;
            animation: spin 1s linear infinite; margin: 0 auto 5px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

       .placeholder-box { text-align: center; color: #666; }

        .bottom-nav {
            position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
            width: 50%; background: var(--card-bg); border-radius: 30px;
            display: flex; justify-content: space-around; padding: 12px 0;
            box-shadow: 0 8px 30px rgba(0,0,0,0.2); z-index: 10;
        }
        .bottom-nav a { text-decoration: none; color: #555; font-size: 14px; font-weight: 500; }
        .bottom-nav a.active { color: #4d8f6b; font-weight: 600; }
    </style>
</head>

<div class="card">
    
    <div class="left">
        <div class="header-row">
             <div class="header-group">
                <img src="C:\Users\Prachi\OneDrive\Desktop\dreamroom\logo.jpeg" class="logo" alt="Logo">
                <h2 id="welcomeText">Design Space</h2>
            </div>
            
            <label class="theme-switch">
                <input type="checkbox" id="themeToggle" onchange="toggleDarkMode()">
                <span class="slider"></span>
            </label>
        </div>
        
        <label>Prompt Style</label>
        <input id="prompt" list="style-options" placeholder="Type or choose a style...">
        <datalist id="style-options">
            <option value="Minimalist"><option value="Modern"><option value="Luxury">
            <option value="Aesthetic">
        </datalist>

        <label>Room Type</label>
        <select id="room_type">
            <option value="bedroom">Bedroom</option>
            <option value="Living room">Living room</option>
            <option value="kitchen">Kitchen</option>
            <option value="bathroom">Bathroom</option>
            <option value="kidsroom">kidsroom</option>
            <option value="dining room">Dining room</option>
            <option value="office">Office</option>
        </select>

        <label>Color Theme</label>
        <div class="color-options">
            <div class="color-circle active" style="background: #f5f5dc;" data-color="warm beige"></div>
            <div class="color-circle" style="background: #ffb6c1;" data-color="blush pink"></div>
            <div class="color-circle" style="background: #000080;" data-color="navy blue"></div>
            <div class="color-circle" style="background: #8b8a8a;" data-color="gray"></div>
            <div class="color-circle" style="background: #ffffff;" data-color="white"></div>
            <div class="color-circle" style="background: #307c3d;" data-color="olive green"></div>
        </div>

        <label>Lighting Style</label>
        <select id="lighting">
            <option value="standard lighting">Standard Lighting</option>
            <option value="natural sunlight">Natural Sunlight</option>
            <option value="neon ambient lighting">Neon Ambient</option>
        </select>

        <button class="gen-btn" onclick="generateDesign()">Generate Design</button>

        <button class="gen-btn" onclick="toggleCustomize()" style="background:#2a4b3a;">
            Customize Design
        </button>

        <div id="customPanel" style="display:none; margin-top:10px; background:rgba(0,0,0,0.05); padding:15px; border-radius:10px; border: 1px dashed var(--accent);">
            <label>Brightness</label>
            <input type="range" id="brightness" min="50" max="150" value="100">

            <label>Apply Interior Filter</label>
            <select id="specialFilter">
                <option value="none">Original Colors</option>
                <option value="hue-rotate(-50deg) saturate(500%) contrast(120%) brightness(0.95)">Turner 1</option>
                <option value="hue-rotate(160deg) saturate(300%) contrast(110%) brightness(1.1)">Turner 2</option>
                <option value="hue-rotate(190deg) saturate(350%) contrast(130%) brightness(0.8)">Turner 3</option>
                <option value="hue-rotate(15deg) saturate(450%) contrast(115%) brightness(0.95)">Turner 4</option>
                <option value="hue-rotate(50deg) saturate(600%) contrast(110%) brightness(1.2)">Turner 5</option>
                <option value="hue-rotate(85deg) saturate(400%) contrast(115%) brightness(1.05)">Turner 6</option>
                <option value="hue-rotate(245deg) saturate(300%) contrast(120%)">Turner 7</option>
                <option value="hue-rotate(295deg) saturate(400%) contrast(110%)">Turner 8</option>
                <option value="grayscale(100%) contrast(130%) brightness(1.1)">Turner 9</option>
            </select>

            <button class="gen-btn" onclick="applyCustomization()" style="background:#2a4b3a; width: 100%;">
                Apply Changes
            </button>
        </div>
        
        <div class="loader-box" id="loaderBox">
            <div class="spinner"></div>
            <div style="font-size: 13px; color: #4d8f6b;">Designing your room...</div>
        </div>
    </div>

    <div class="right">
        <div id="placeholderText" class="placeholder-box">
            <h2>Generated Design</h2>
            <p>Select options and click generate</p>
        </div>

        <div class="comparison-slider" id="sliderContainer">
            <img id="beforeImg" class="before-img" alt="Original AI Result">
            <img id="resultImg" class="result-img" alt="Filtered Result">
            <div class="slider-handle" id="handle"></div>
        </div>
        
        <button id="saveBtn" onclick="saveToProfile()" title="Save design to Profile">
            <span class="material-symbols-outlined">download</span>
        </button>
    </div>

    <div class="bottom-nav">
        <a href="de.html" class="active">Home</a>
        <a href="explore.html">Explore</a>
        <a href="profile.html">Profile</a>
    </div>
</div>

<!-- ONLY SCRIPT PART UPDATED (Rest SAME as your code) -->

window.onload = () => {
    if (localStorage.getItem('isLoggedIn') !== 'true') {
        window.location.href = "login.html";
        return;
    }
    document.getElementById('welcomeText').innerText = "Hi, " + (localStorage.getItem('savedName') || "User");
    if (localStorage.getItem('theme') === 'dark') {
        document.body.classList.add('dark-mode');
        document.getElementById('themeToggle').checked = true;
    }
};

function toggleDarkMode() {
    const isDark = document.body.classList.toggle('dark-mode');
    localStorage.setItem('theme', isDark ? 'dark' : 'light');
}

let selectedColor = "warm beige";
document.querySelectorAll('.color-circle').forEach(circle => {
    circle.addEventListener('click', function() {
        document.querySelectorAll('.color-circle').forEach(c => c.classList.remove('active'));
        this.classList.add('active');
        selectedColor = this.getAttribute('data-color');
    });
});

// ✅ 🔥 IMPORTANT FIX (AUTO LOWERCASE KEYS)
const NORMALIZED_IMAGE_MAP = {};
Object.keys(IMAGE_MAP).forEach(key => {
    NORMALIZED_IMAGE_MAP[key.toLowerCase()] = IMAGE_MAP[key];
});

let currentIndex = 0;
let lastKey = "";

function generateDesign() {
    const style = document.getElementById("prompt").value.toLowerCase().trim();
    const room = document.getElementById("room_type").value.toLowerCase();
    const light = document.getElementById("lighting").value.toLowerCase();

    // ✅ FIXED KEY MATCH
    const searchKey = `${style}-${room}-${selectedColor}-${light}`.toLowerCase();

    const loader = document.getElementById("loaderBox");
    const img = document.getElementById("resultImg");
    const beforeImg = document.getElementById("beforeImg");
    const placeholder = document.getElementById("placeholderText");
    const saveBtn = document.getElementById("saveBtn");
    const slider = document.getElementById("sliderContainer");

    loader.style.display = "block";
    img.style.display = "none";
    slider.style.display = "none";
    placeholder.style.display = "none";
    saveBtn.style.display = "none";

    setTimeout(() => {

        // ✅ USE NORMALIZED MAP
        if (NORMALIZED_IMAGE_MAP[searchKey]) {

            const images = NORMALIZED_IMAGE_MAP[searchKey];

            if (lastKey !== searchKey) {
                currentIndex = -1;
            }

            currentIndex = (currentIndex + 1) % images.length;
            lastKey = searchKey;

            img.src = images[currentIndex];

            img.onload = () => {
                img.style.display = "block";
                img.style.clipPath = "inset(0 0 0 0)";

                beforeImg.src = img.src;
                slider.style.display = "block";

                loader.style.display = "none";
                saveBtn.style.display = "flex";
            };

            // ✅ SAFE ERROR HANDLING
            img.onerror = () => {
                img.src = "https://via.placeholder.com/800x500?text=Image+Not+Available";
                loader.style.display = "none";
            };

        } else {
            loader.style.display = "none";
            placeholder.style.display = "block";
            placeholder.innerHTML = `<p>No match for "${searchKey}"</p>`;
        }

    }, 1000);
}

function toggleCustomize() {
    const panel = document.getElementById("customPanel");
    panel.style.display = panel.style.display === "none" ? "block" : "none";
}

function applyCustomization() {
    const resultImg = document.getElementById("resultImg");
    const handle = document.getElementById("handle");

    if (!resultImg.src) return;

    const brightnessValue = document.getElementById("brightness").value;
    const specialFilter = document.getElementById("specialFilter").value;

    resultImg.style.filter = `brightness(${brightnessValue}%) ${specialFilter}`;

    handle.style.display = "block";
    resultImg.style.clipPath = "inset(0 0 0 50%)";
    handle.style.left = "50%";
}

// ✅ SLIDER FIX
function initSlider() {
    const slider = document.getElementById('sliderContainer');
    const handle = document.getElementById('handle');
    const resultImg = document.getElementById('resultImg');

    handle.onmousedown = (e) => {
        e.preventDefault();
        document.onmousemove = (event) => {
            let rect = slider.getBoundingClientRect();
            let x = event.clientX - rect.left;
            let percent = (x / rect.width) * 100;

            if (percent >= 0 && percent <= 100) {
                handle.style.left = percent + '%';
                resultImg.style.clipPath = `inset(0 0 0 ${percent}%)`;
            }
        };
        document.onmouseup = () => {
            document.onmousemove = null;
        };
    };
}

initSlider();

</script>
