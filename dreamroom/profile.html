<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile | Interior Design Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary-green: #355f4a; 
            --hover-green: #2a4b3a;
            --bg-beige: #f4efe7; 
            --white: #ffffff; 
            --text-main: #333;
            --text-muted: #777;
        }

        /* DARK MODE OVERRIDES */
        body.dark {
            background: linear-gradient(rgba(0,0,0,.85), rgba(0,0,0,.85)),
                        url("https://images.unsplash.com/photo-1505691938895-1758d7feb511?auto=format&fit=crop&w=1600&q=80") center/cover no-repeat;
        }
        body.dark .card { background: #1a1a1a; color: white; }
        body.dark .main-content { background: #121212; }
        body.dark .profile-left { background: #1d2520; border-right: 1px solid #333; }
        body.dark .profile-left h2, body.dark .profile-right h1 { color: #eee; }
        body.dark .stat-card { background: #242424; border-color: #444; }
        body.dark .stat-card h3 { color: #4caf50; }
        body.dark .avatar { background: #333; color: white; }
        body.dark .bottom-nav { background: #242424; }
        body.dark .bottom-nav a { color: #aaa; }

        * { box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body { 
            margin: 0; 
            height: 100vh; 
            background: linear-gradient(rgba(0,0,0,.6), rgba(0,0,0,.6)),
                        url("https://images.unsplash.com/photo-1505691938895-1758d7feb511?auto=format&fit=crop&w=1600&q=80") center/cover no-repeat;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            overflow: hidden;
            transition: 0.3s;
        }

        /* SIDE NAVIGATION DRAWER */
        .side-nav {
            height: 100%;
            width: 0;
            position: fixed;
            z-index: 1000;
            top: 0;
            right: 0;
            background-color: var(--primary-green);
            overflow-x: hidden;
            transition: 0.5s;
            padding-top: 80px; /* Space for the big arrow */
            box-shadow: -5px 0 25px rgba(0,0,0,0.3);
        }

        .side-nav a {
            padding: 18px 32px;
            text-decoration: none;
            font-size: 16px;
            color: white;
            display: block;
            transition: 0.3s;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .close-btn {
            position: absolute;
            top: 10px;
            left: 20px;
            font-size: 45px; /* Big and accessible */
            color: white;
            cursor: pointer;
            user-select: none;
            transition: 0.3s;
        }

        .close-btn:hover {
            transform: translateX(-5px);
            color: #ccc;
        }

        /* MAIN CARD STYLE */
        .card {
            width: 85%; 
            max-width: 1100px; 
            height: 80%;
            background: #fff; 
            border-radius: 24px;
            display: flex; 
            flex-direction: column;
            overflow: hidden; 
            position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            transition: 0.3s;
        }

        .header { 
            background: var(--primary-green); 
            color: white; 
            padding: 20px 40px; 
            display: flex; 
            align-items: center; 
            z-index: 10;
        }

        .back, .menu { cursor: pointer; font-size: 22px; transition: 0.3s; }
        .title { flex: 1; text-align: center; font-weight: 600; font-size: 18px; }

        /* CONTENT AREA */
        .main-content {
            flex: 1;
            display: flex;
            background: #fafafa;
            overflow-y: auto;
            padding-bottom: 80px;
        }

        .profile-left {
            width: 40%;
            background: var(--bg-beige);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            border-right: 1px solid #eee;
        }

        .profile-right {
            flex: 1;
            padding: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .avatar { 
            width: 150px; 
            height: 150px; 
            background: white; 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 70px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        .profile-left h2 { margin: 10px 0; color: var(--text-main); font-size: 28px; }
        .profile-left p { color: var(--text-muted); margin-bottom: 30px; }

        .stats-row { display: flex; gap: 20px; margin-bottom: 40px; }

        .stat-card { 
            flex: 1; 
            background: white; 
            padding: 25px; 
            border-radius: 20px; 
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            border: 1px solid #eee;
        }

        .stat-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .stat-card h3 { margin: 0; color: var(--primary-green); font-size: 32px; }
        .stat-card span { font-size: 12px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; }

        .btn-group { display: flex; gap: 15px; }
        
        button { 
            flex: 1;
            padding: 18px; 
            border-radius: 16px; 
            border: none; 
            cursor: pointer; 
            font-size: 15px; 
            font-weight: 600;
            transition: 0.3s;
        }

        .btn-premium { background: var(--primary-green); color: white; }
        .btn-premium:hover { background: var(--hover-green); }
        .btn-logout { background: #f0f0f0; color: #555; }
        .btn-logout:hover { background: #e0e0e0; }

        /* BOTTOM NAVIGATION */
        .bottom-nav {
            position: absolute; 
            bottom: 20px;
            left: 50%; 
            transform: translateX(-50%);
            width: 400px; 
            background: #fff;
            border-radius: 30px;
            display: flex; 
            justify-content: space-around;
            padding: 14px 0;
            box-shadow: 0 8px 30px rgba(0,0,0,0.2);
            z-index: 100;
        }
        .bottom-nav a { text-decoration: none; color: #555; font-size: 14px; font-weight: 500; }
        .bottom-nav a.active { color: #4d8f6b; font-weight: 600; }

        /* LOGOUT POPUP */
        #logoutPopup {
            position: fixed; 
            top: 20px; 
            left: 50%; 
            transform: translateX(-50%) translateY(-150px); 
            background: #355f4a; 
            color: white; 
            padding: 15px 30px; 
            border-radius: 50px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); 
            z-index: 9999; 
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 500;
            pointer-events: none;
        }

        .theme-toggle-btn {
            background: transparent;
            border: 1px solid white;
            color: white;
            border-radius: 50%;
            width: 35px;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            margin-right: 15px;
            font-size: 16px;
        }

    </style>
</head>
<body>

<div id="logoutPopup">
    <span>👋 See you soon! You've been signed out.</span>
</div>

<div id="mySideNav" class="side-nav">
    <span class="close-btn" onclick="toggleSideNav()">&larr;</span>
    <a href="index.html">Home</a>
    <a href="explore.html">Explore</a>
    <a href="profile.html">Profile</a>
</div>

<div class="card">
    <div class="header">
        <div class="back" onclick="location.href='explore.html'">←</div>
        <div class="title">User Profile</div>
        <div style="display: flex; align-items: center;">
            <button class="theme-toggle-btn" onclick="toggleTheme()" title="Toggle Dark Mode">🌓</button>
            <div class="menu" onclick="toggleSideNav()">☰</div>
        </div>
    </div>

    <div class="main-content">
        <div class="profile-left">
            <div class="avatar">👤</div>
            <h2>Jane Doe</h2>
            <p>jane.doe@gmail.com</p>
            <div style="width: 100%;">
                <button class="btn-logout" onclick="Signout()" style="width: 100%;">Sign Out</button>
            </div>
        </div>

        <div class="profile-right">
            <h1 style="margin-top: 0; color: #355f4a;">Dashboard Overview</h1>
            <p style="color: #666; margin-bottom: 30px;">Manage your saved designs and subscription preferences.</p>

            <div class="stats-row">
                <div class="stat-card" onclick="location.href='liked.html'">
                    <h3 id="likedCount">0</h3>
                    <span>Liked Designs</span>
                </div>
                <div class="stat-card">
                    <h3>Free</h3>
                    <span>Account Plan</span>
                </div>
            </div>

            <div class="btn-group">
                <button class="btn-premium" onclick="location.href='premium.html'">Upgrade to Premium</button>
                <button class="btn-logout" onclick="location.href='downloaded.html'">Downloaded Designs</button> </div>
        </div>
    </div>

    <div class="bottom-nav">
        <a href="index.html">Home</a>
        <a href="explore.html">Explore</a>
        <a href="profile.html" class="active">Profile</a>
    </div>
</div>

<script>
    // THEME LOGIC
    function toggleTheme() {
        const isDark = document.body.classList.toggle("dark");
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
    }

    // 1. SECURITY: Check if user is logged in immediately
    if (localStorage.getItem('isLoggedIn') !== 'true') {
        window.location.href = "login.html";
    }

    function toggleSideNav() {
        const sideNav = document.getElementById("mySideNav");
        sideNav.style.width = (sideNav.style.width === "250px") ? "0" : "250px";
    }

    function Signout() { 
        const popup = document.getElementById("logoutPopup");
        localStorage.removeItem('isLoggedIn');
        popup.style.transform = "translateX(-50%) translateY(40px)";
        setTimeout(() => {
            window.location.href = "login.html"; 
        }, 2000);
    }

    // 2. DATA LOADING
    document.addEventListener("DOMContentLoaded", () => {
        // Sync Theme
        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark');
        }

        // Update Name
        const savedName = localStorage.getItem('savedName') || "User";
        const nameElement = document.querySelector(".profile-left h2");
        if (nameElement) nameElement.innerText = savedName;

        // FIXED: Force Update Email
        const savedEmail = localStorage.getItem('savedEmail');
        const emailElement = document.querySelector(".profile-left p");
        if (emailElement) {
            emailElement.innerText = savedEmail ? savedEmail : "No email found";
        }

        // Count Liked Designs
        const likedImages = JSON.parse(localStorage.getItem('likedImages')) || [];
        const countElement = document.getElementById('likedCount');
        if (countElement) countElement.innerText = likedImages.length;

        // NEW: Count Downloaded/Saved Designs
        const savedDesigns = JSON.parse(localStorage.getItem('downloadedDesigns')) || [];
        const downloadBtn = document.querySelector(".btn-logout[onclick*='downloaded.html']");
        if (downloadBtn) {
            downloadBtn.innerText = `Downloaded Designs (${savedDesigns.length})`;
        }
    });
</script>
</body>
</html>
