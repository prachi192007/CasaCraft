<!DOCTYPE html>
<html>
<head>
<title>CasaCraft Login</title>

<style>
/* --- DARK MODE ADDITIONS --- */
body.dark {
    background: linear-gradient(rgba(0,0,0,.75),rgba(0,0,0,.75)),
    url("https://bodaq.com/wp-content/uploads/2023/03/Bodaq-blog-post-pics-1-16.jpg") no-repeat center/cover;
}
body.dark .login-card { background: #1a1a1a; color: white; border: 1px solid #333; }
body.dark h1 { color: #4caf50; }
body.dark input { background: #242424; border-color: #444; color: white; }
body.dark p { color: #bbb; }
body.dark a { color: #4caf50; }
body.dark .theme-btn { border-color: #444; color: white; }

body{
height:100vh;
background:linear-gradient(rgba(0,0,0,.35),rgba(0,0,0,.35)),
url("https://bodaq.com/wp-content/uploads/2023/03/Bodaq-blog-post-pics-1-16.jpg") no-repeat center/cover;
display:flex;
justify-content:center;
align-items:center;
font-family:Segoe UI;
transition: 0.3s;
}

.login-card{
width:380px;
padding:35px;
background:white;
border-radius:20px;
text-align:center;
position: relative; /* Needed for button positioning */
transition: 0.3s;
}

input{
width:100%;
padding:12px;
margin-bottom:15px;
border-radius:10px;
border:1px solid #ddd;
}

button{
width:100%;
padding:12px;
background:#2f5d5a;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
}

#error{
color:red;
font-size:13px;
display:none;
margin-bottom:10px;
}

/* TOGGLE BUTTON STYLE */
.theme-btn {
    position: absolute;
    top: 15px;
    right: 15px;
    background: transparent;
    border: 1px solid #ddd;
    border-radius: 50%;
    width: 30px;
    height: 30px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
}
</style>
</head>

<body>

<div class="login-card">
<button class="theme-btn" onclick="toggleTheme()">🌓</button>
<h1>CasaCraft</h1>

<form onsubmit="loginUser(event)">
<input type="email" id="loginEmail" placeholder="Email" required>
<input type="password" id="loginPassword" placeholder="Password" required>

<div id="error">Invalid email or password</div>

<button type="submit">Login</button>
</form>

<p>No account? <a href="signup.html">Sign Up</a></p>
</div>

<script>
/* THEME SYNC SCRIPT */
function toggleTheme() {
    const isDark = document.body.classList.toggle("dark");
    localStorage.setItem('theme', isDark ? 'dark' : 'light');
}

document.addEventListener("DOMContentLoaded", () => {
    if (localStorage.getItem('theme') === 'dark') {
        document.body.classList.add('dark');
    }
});

function loginUser(event){
event.preventDefault();

const email=document.getElementById('loginEmail').value;
const password=document.getElementById('loginPassword').value;

let users=JSON.parse(localStorage.getItem('users')) || [];

let validUser=users.find(user =>
user.email===email && user.password===password
);

if(validUser){
localStorage.setItem('isLoggedIn','true');
localStorage.setItem('savedName',validUser.name);
// FIXED: This line ensures the email is saved so the profile can show it
localStorage.setItem('savedEmail', validUser.email);
window.location.href='index.html';
}
else{
document.getElementById('error').style.display='block';
}
}
</script>

</body>
</html>
