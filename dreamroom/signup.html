<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CasaCraft | Sign Up</title>

<style>
/* --- DARK MODE ADDITIONS --- */
body.dark {
    background: linear-gradient(rgba(0,0,0,.75),rgba(0,0,0,.75)),
    url("https://bodaq.com/wp-content/uploads/2023/03/Bodaq-blog-post-pics-1-16.jpg") no-repeat center/cover;
}
body.dark .signup-card { background: rgba(26,26,26,.95); color: white; border: 1px solid #333; }
body.dark h1 { color: #4caf50; }
body.dark input { background: #242424; border-color: #444; color: white; }
body.dark p { color: #bbb; }
body.dark a { color: #4caf50; }
body.dark .theme-btn { border-color: #444; color: white; }

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Segoe UI",sans-serif;
}

body{
height:100vh;
background:linear-gradient(rgba(0,0,0,.35),rgba(0,0,0,.35)),
url("https://bodaq.com/wp-content/uploads/2023/03/Bodaq-blog-post-pics-1-16.jpg") no-repeat center/cover;
display:flex;
justify-content:center;
align-items:center;
transition: 0.3s;
}

.signup-card{
width:380px;
padding:35px;
border-radius:20px;
background:rgba(255,255,255,.92);
text-align:center;
position: relative; /* Needed for button positioning */
transition: 0.3s;
}

input{
width:100%;
padding:12px;
margin-bottom:15px;
border-radius:10px;
border:1px solid #ddd;
outline:none;
}

button{
width:100%;
padding:12px;
background:#2f5d5a;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
}

#error-msg{
color:red;
font-size:13px;
margin-bottom:10px;
display:none;
}

/* TOGGLE BUTTON STYLE */
.theme-btn {
    position: absolute;
    top: 15px;
    right: 15px;
    background: transparent;
    border: 1px solid #ddd;
    border-radius: 50%;
    width: 30px;
    height: 30px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
}
</style>
</head>

<body>

<div class="signup-card">
<button class="theme-btn" onclick="toggleTheme()">🌓</button>
<h1>CasaCraft</h1>

<form id="signupForm">
<input type="text" id="fullName" placeholder="Full Name" required>
<input type="email" id="email" placeholder="Email" required>
<input type="password" id="password" placeholder="Password" required>
<input type="password" id="confirmPassword" placeholder="Confirm Password" required>

<div id="error-msg"></div>

<button type="submit">Sign Up</button>
</form>

<p>Already have account? <a href="login.html">Login</a></p>
</div>

<script>
/* THEME SYNC SCRIPT */
function toggleTheme() {
    const isDark = document.body.classList.toggle("dark");
    localStorage.setItem('theme', isDark ? 'dark' : 'light');
}

document.addEventListener("DOMContentLoaded", () => {
    if (localStorage.getItem('theme') === 'dark') {
        document.body.classList.add('dark');
    }
});

const form=document.getElementById('signupForm');
const error=document.getElementById('error-msg');

form.addEventListener('submit',function(e){
e.preventDefault();

const name=document.getElementById('fullName').value;
const email=document.getElementById('email').value;
const password=document.getElementById('password').value;
const confirm=document.getElementById('confirmPassword').value;

if(password!==confirm){
error.style.display='block';
error.innerText='Passwords do not match';
return;
}

if(password.length<6){
error.style.display='block';
error.innerText='Password minimum 6 characters';
return;
}

let users=JSON.parse(localStorage.getItem('users')) || [];

let existing=users.find(user=>user.email===email);

if(existing){
error.style.display='block';
error.innerText='Email already registered';
return;
}

users.push({
name:name,
email:email,
password:password
});

localStorage.setItem('users',JSON.stringify(users));

// FIXED: Save these so that profile updates even after a fresh signup
localStorage.setItem('savedName', name);
localStorage.setItem('savedEmail', email);

alert("Signup successful");
window.location.href="index.html";
});
</script>

</body>
</html>
