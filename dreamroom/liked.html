<!DOCTYPE html>
<html>
<head>
<title>Liked Designs</title>
<style>
*{box-sizing:border-box;font-family:Inter, Arial}
body{ margin:0; height:100vh; background:#f4efe7; display:flex; justify-content:center; align-items:center; }
.card{ width:85%; max-width:1100px; height:80%; background:#fff; border-radius:24px; display:flex; flex-direction:column; overflow:hidden; position:relative; padding:28px; }
.grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(250px,1fr)); gap:20px; overflow-y:auto; padding-bottom:80px; }
img{ width:100%; height:200px; object-fit:cover; border-radius:10px; border: 1px solid #eee; }
.bottom-nav{ position:absolute; bottom:16px; left:50%; transform:translateX(-50%); width:55%; background:#fff; border-radius:30px; display:flex; justify-content:space-around; padding:12px 0; box-shadow:0 8px 30px rgba(0,0,0,.2); }
.bottom-nav a{ text-decoration:none; color:#555; font-size:14px; font-weight:500; }
.bottom-nav a.active{ color:#4d8f6b; font-weight:600; }
#no-likes { text-align: center; color: #888; margin-top: 50px; width: 100%; grid-column: 1 / -1; }
</style>
</head>
<body>

<div class="card">
    <h2>Your Liked Designs ❤️</h2>
    <div class="grid" id="likedGrid"></div>

    <div class="bottom-nav">
        <a href="index.html">Home</a>
        <a href="explore.html">Explore</a>
        <a href="profile.html" class="active">Profile</a>
    </div>
</div>

<script>
    const grid = document.getElementById('likedGrid');
    const likedImages = JSON.parse(localStorage.getItem('likedImages')) || [];

    if (likedImages.length === 0) {
        grid.innerHTML = `<div id="no-likes">
            <p>You haven't liked any designs yet.</p>
            <a href="explore.html" style="color:#4d8f6b">Go Explore</a>
        </div>`;
    } else {
        likedImages.forEach(url => {
            const img = document.createElement('img');
            img.src = url;
            grid.appendChild(img);
        });
    }
</script>
</body>
</html>
